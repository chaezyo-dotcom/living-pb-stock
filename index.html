<style>
  :root{
    --bg:#f5f6f8; --card:#ffffff; --ink:#1f2430; --sub:#6b7280;
    --line:#e6e8ec; --accent:#2f6df0; --danger:#e04848; --danger-bg:#fdeaea;
    --chip:#eef1f6; --shadow:0 1px 3px rgba(20,30,50,.06),0 1px 2px rgba(20,30,50,.04);
    --layer:#2f6df0; --layer-bg:#e9f0fe; --kove:#0f9d76; --kove-bg:#e6f6f0; --winter:#7a5af0; --winter-bg:#efebfe;
    --req:#c2410c; --req-bg:#fdf0e6; --add:#475569; --add-bg:#eef1f5;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:1120px;margin:0 auto;padding:24px 16px 80px;}
  header h1{font-size:22px;font-weight:800;margin:0 0 6px;letter-spacing:-.3px;}
  header .meta{font-size:13px;color:var(--sub);}
  header .meta b{color:var(--ink);font-weight:600;}

  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0 8px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);}
  .stat .label{font-size:12px;color:var(--sub);margin-bottom:6px;}
  .stat .num{font-size:28px;font-weight:800;line-height:1;letter-spacing:-1px;}
  .stat .num small{font-size:13px;font-weight:600;color:var(--sub);margin-left:3px;}
  .stat.red .num{color:var(--danger);}

  .toolbar{display:flex;gap:10px;align-items:center;margin:18px 0 14px;flex-wrap:wrap;}
  .search{flex:1;min-width:220px;position:relative;}
  .search input{width:100%;padding:11px 14px 11px 38px;border:1px solid var(--line);border-radius:10px;
    font-size:14px;background:var(--card);outline:none;}
  .search input:focus{border-color:var(--accent);}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.45;}
  .btns{display:flex;gap:6px;}
  .btn{padding:9px 14px;border:1px solid var(--line);background:var(--card);border-radius:10px;
    font-size:13px;cursor:pointer;color:var(--ink);font-weight:600;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}

  .brandsec{margin:22px 0 10px;display:flex;align-items:center;gap:10px;}
  .brandsec .btag{font-size:14px;font-weight:800;padding:5px 13px;border-radius:20px;letter-spacing:-.2px;}
  .brandsec .bmeta{font-size:12.5px;color:var(--sub);}
  .btag.layer{color:var(--layer);background:var(--layer-bg);}
  .btag.kove{color:var(--kove);background:var(--kove-bg);}
  .btag.winter{color:var(--winter);background:var(--winter-bg);}

  .group{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;
    box-shadow:var(--shadow);overflow:hidden;}
  .ghead{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;}
  .ghead:hover{background:#fafbfc;}
  .gcode-wrap{display:flex;align-items:center;gap:5px;white-space:nowrap;}
  .gcode{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;font-weight:700;
    background:var(--chip);padding:4px 9px;border-radius:7px;color:#374151;cursor:copy;}
  .gcode:hover{background:#dfe3ea;}
  .copy{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border:1px solid var(--line);
    background:#fff;border-radius:7px;cursor:pointer;color:var(--sub);padding:0;}
  .copy:hover{border-color:var(--accent);color:var(--accent);}
  .copy.done{border-color:var(--kove);color:var(--kove);background:var(--kove-bg);}
  .bmini{font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap;}
  .bmini.layer{color:var(--layer);background:var(--layer-bg);}
  .bmini.kove{color:var(--kove);background:var(--kove-bg);}
  .bmini.winter{color:var(--winter);background:var(--winter-bg);}
  .gname{flex:1;font-size:14px;font-weight:600;min-width:0;}
  .gcount{font-size:12.5px;font-weight:700;color:var(--danger);background:var(--danger-bg);
    padding:4px 10px;border-radius:20px;white-space:nowrap;}
  .gsbadge{font-size:11px;font-weight:700;color:#fff;background:var(--danger);padding:3px 9px;border-radius:6px;white-space:nowrap;}
  .okbadge{font-size:12.5px;font-weight:700;color:var(--kove);background:var(--kove-bg);padding:4px 10px;border-radius:20px;white-space:nowrap;}
  .arrow{transition:transform .18s;opacity:.5;flex-shrink:0;}
  .group.collapsed .arrow{transform:rotate(-90deg);}
  .group.collapsed .gbody{display:none;}

  .gbody{border-top:1px solid var(--line);overflow-x:auto;}
  table{width:100%;border-collapse:collapse;min-width:680px;}
  th,td{text-align:left;padding:10px 16px;font-size:13.5px;vertical-align:middle;}
  thead th{font-size:11.5px;color:var(--sub);font-weight:600;background:#fafbfc;
    border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.3px;}
  tbody tr{border-bottom:1px solid #f1f2f4;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:#fafbfd;}
  .oc{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;color:#475569;white-space:nowrap;}
  .on{font-weight:500;}
  .date{color:var(--sub);font-size:12.5px;white-space:nowrap;}
  .tbadge{font-size:11px;font-weight:700;padding:3px 7px;border-radius:6px;white-space:nowrap;}
  .tbadge.req{color:var(--req);background:var(--req-bg);}
  .tbadge.add{color:var(--add);background:var(--add-bg);}
  .memo-in{width:100%;min-width:150px;padding:6px 9px;border:1px solid var(--line);border-radius:8px;
    font-size:12.5px;font-family:inherit;background:#fff;outline:none;color:var(--ink);}
  .memo-in:focus{border-color:var(--accent);}
  .memo-in::placeholder{color:#b6bcc6;}
  .col-oc{width:108px;} .col-type{width:78px;} .col-date{width:104px;} .col-memo{width:230px;}

  .empty{display:none;text-align:center;padding:50px 20px;color:var(--sub);font-size:14px;}
  footer{margin-top:30px;text-align:center;font-size:12px;color:var(--sub);}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#1f2430;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;
    opacity:0;pointer-events:none;transition:all .2s;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media(max-width:640px){
    .cards{grid-template-columns:repeat(2,1fr);}
    .ghead{padding:12px 13px;gap:8px;flex-wrap:wrap;}
    .gname{font-size:13px;flex-basis:100%;order:5;}
  }
</style>

const toast = document.getElementById('toast');
let toastT;
function showToast(msg){
  toast.textContent = msg; toast.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(()=>toast.classList.remove('show'), 1400);
}
function copyCode(code, btnEl){
  const done = () => {
    showToast('상품코드 ' + code + ' 복사됨');
    if(btnEl){ btnEl.classList.add('done'); setTimeout(()=>btnEl.classList.remove('done'), 1200); }
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(code).then(done).catch(()=>fallbackCopy(code, done));
  } else { fallbackCopy(code, done); }
}
function fallbackCopy(text, cb){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); cb(); }catch(e){}
  document.body.removeChild(ta);
}

const listEl = document.getElementById('list');
function render(filter){
  filter = (filter||'').trim().toLowerCase();
  listEl.innerHTML = '';
  let shown = 0;

  BRAND_ORDER.forEach(brand => {
    let groups = GROUPS.filter(g => g.brand === brand).sort((a,b)=>Number(a.gc)-Number(b.gc));
    const rendered = [];
    groups.forEach(g => {
      let opts = g.opts;
      const groupMatch = !filter || g.brand.toLowerCase().includes(filter)
        || g.gc.toLowerCase().includes(filter) || g.gn.toLowerCase().includes(filter);
      if(filter && !groupMatch){
        opts = g.opts.filter(o => o.oc.toLowerCase().includes(filter) || o.on.toLowerCase().includes(filter));
        if(opts.length === 0) return;
      }
      rendered.push({g, opts});
    });
    if(rendered.length === 0) return;

    const cls = BRAND_CLASS[brand] || 'layer';
    const optSum = rendered.reduce((a,r)=>a+r.opts.length,0);
    const oosCnt = rendered.filter(r=>r.opts.length>0).length;
    const sec = document.createElement('div');
    sec.className = 'brandsec';
    sec.innerHTML = '<span class="btag '+cls+'">'+esc(brand)+'</span>'
      + '<span class="bmeta">상품 '+rendered.length+'개 (품절 '+oosCnt+') · 품절 옵션 '+optSum+'개</span>';
    listEl.appendChild(sec);

    rendered.forEach(({g, opts}) => {
      shown++;
      const div = document.createElement('div');
      div.className = 'group';
      const rows = opts.map(o => {
        const tcls = o.t === '필수' ? 'req' : 'add';
        const memoVal = localStorage.getItem(MEMO_KEY(o.oc)) || '';
        return '<tr>'
          + '<td class="oc">'+esc(o.oc)+'</td>'
          + '<td><span class="tbadge '+tcls+'">'+esc(o.t)+'옵션</span></td>'
          + '<td class="on">'+esc(o.on)+'</td>'
          + '<td class="date">'+esc(o.d)+'</td>'
          + '<td><input class="memo-in" type="text" data-oc="'+esc(o.oc)+'" value="'+esc(memoVal)+'" placeholder="단종 / 재입고 예정일 메모"></td>'
          + '</tr>';
      }).join('');
      div.innerHTML =
        '<div class="ghead">'
        + '<span class="gcode-wrap">'
          + '<span class="gcode" data-code="'+esc(g.gc)+'" title="클릭하면 상품코드 복사">'+esc(g.gc)+'</span>'
          + '<button class="copy" data-code="'+esc(g.gc)+'" title="상품코드 복사">'
            + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>'
          + '</button>'
        + '</span>'
        + '<span class="bmini '+(BRAND_CLASS[g.brand]||'layer')+'">'+esc(g.brand)+'</span>'
        + '<span class="gname">'+esc(g.gn)+'</span>'
        + (g.gs==='OUT' ? '<span class="gsbadge">전체품절</span>' : '')
        + (opts.length===0 ? '<span class="okbadge">품절 없음</span>' : '<span class="gcount">품절 '+opts.length+'개</span>')
        + (opts.length===0 ? '' : '<svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>')
        + '</div>'
        + (opts.length===0 ? '' :
           '<div class="gbody"><table>'
           + '<thead><tr><th class="col-oc">옵션코드</th><th class="col-type">구분</th><th>옵션명</th><th class="col-date">품절일</th><th class="col-memo">메모 (단종/재입고예정)</th></tr></thead>'
           + '<tbody>'+rows+'</tbody></table></div>');

      div.querySelector('.ghead').addEventListener('click', (e) => {
        if(e.target.closest('.gcode') || e.target.closest('.copy')) return;
        if(!div.querySelector('.gbody')) return;
        div.classList.toggle('collapsed');
      });
      div.querySelector('.gcode').addEventListener('click', (e) => { e.stopPropagation(); copyCode(g.gc); });
      div.querySelector('.copy').addEventListener('click', (e) => { e.stopPropagation(); copyCode(g.gc, e.currentTarget); });
      div.querySelectorAll('.memo-in').forEach(inp => {
        inp.addEventListener('input', () => {
          const oc = inp.getAttribute('data-oc');
          const v = inp.value;
          if(v) localStorage.setItem(MEMO_KEY(oc), v);
          else localStorage.removeItem(MEMO_KEY(oc));
        });
      });
      listEl.appendChild(div);
    });
  });

  document.getElementById('empty').style.display = shown ? 'none' : 'block';
}
render('');

let t;
document.getElementById('q').addEventListener('input', e => {
  clearTimeout(t);
  t = setTimeout(() => render(e.target.value), 120);
});
document.getElementById('expandAll').addEventListener('click', () =>
  document.querySelectorAll('.group').forEach(g => g.classList.remove('collapsed')));
document.getElementById('collapseAll').addEventListener('click', () =>
  document.querySelectorAll('.group').forEach(g => g.classList.add('collapsed')));
</script>
</body>
