<meta charset="UTF-8">

<title>리빙PB 품절 옵션 현황 (상품코드별)</title>
<style>
  :root{
    --bg:#f5f6f8; --card:#ffffff; --ink:#1f2430; --sub:#6b7280;
    --line:#e6e8ec; --accent:#2f6df0; --danger:#e04848; --danger-bg:#fdeaea;
    --chip:#eef1f6; --shadow:0 1px 3px rgba(20,30,50,.06),0 1px 2px rgba(20,30,50,.04);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:1080px;margin:0 auto;padding:24px 16px 80px;}
  header h1{font-size:22px;font-weight:800;margin:0 0 6px;letter-spacing:-.3px;}
  header .meta{font-size:13px;color:var(--sub);}
  header .meta b{color:var(--ink);font-weight:600;}

  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0 8px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);}
  .stat .label{font-size:12px;color:var(--sub);margin-bottom:6px;}
  .stat .num{font-size:30px;font-weight:800;line-height:1;letter-spacing:-1px;}
  .stat .num small{font-size:14px;font-weight:600;color:var(--sub);margin-left:3px;}
  .stat.red .num{color:var(--danger);}

  .toolbar{display:flex;gap:10px;align-items:center;margin:18px 0 14px;flex-wrap:wrap;}
  .search{flex:1;min-width:220px;position:relative;}
  .search input{width:100%;padding:11px 14px 11px 38px;border:1px solid var(--line);border-radius:10px;
    font-size:14px;background:var(--card);outline:none;}
  .search input:focus{border-color:var(--accent);}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.45;}
  .btns{display:flex;gap:6px;}
  .btn{padding:9px 14px;border:1px solid var(--line);background:var(--card);border-radius:10px;
    font-size:13px;cursor:pointer;color:var(--ink);font-weight:600;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}

  .group{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;
    box-shadow:var(--shadow);overflow:hidden;}
  .ghead{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;}
  .ghead:hover{background:#fafbfc;}
  .gcode{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;font-weight:700;
    background:var(--chip);padding:4px 9px;border-radius:7px;color:#374151;white-space:nowrap;}
  .gname{flex:1;font-size:14.5px;font-weight:600;min-width:0;}
  .gcount{font-size:12.5px;font-weight:700;color:var(--danger);background:var(--danger-bg);
    padding:4px 10px;border-radius:20px;white-space:nowrap;}
  .arrow{transition:transform .18s;opacity:.5;}
  .group.collapsed .arrow{transform:rotate(-90deg);}
  .group.collapsed .gbody{display:none;}

  .gbody{border-top:1px solid var(--line);}
  table{width:100%;border-collapse:collapse;}
  th,td{text-align:left;padding:10px 18px;font-size:13.5px;vertical-align:top;}
  thead th{font-size:11.5px;color:var(--sub);font-weight:600;background:#fafbfc;
    border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.3px;}
  tbody tr{border-bottom:1px solid #f1f2f4;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:#fafbfd;}
  .oc{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;color:#475569;white-space:nowrap;}
  .on{font-weight:500;}
  .date{color:var(--sub);font-size:12.5px;white-space:nowrap;}
  .col-oc{width:120px;} .col-date{width:110px;}

  .empty{display:none;text-align:center;padding:50px 20px;color:var(--sub);font-size:14px;}
  footer{margin-top:30px;text-align:center;font-size:12px;color:var(--sub);}

  @media(max-width:640px){
    .cards{grid-template-columns:1fr;}
    .col-oc,.col-date{width:auto;}
    th,td{padding:9px 12px;}
    .ghead{padding:12px 14px;}
    .gname{font-size:13.5px;}
  }
</style>

const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// 통계
const totalOpt = GROUPS.reduce((a,g)=>a+g.opts.length,0);
const maxOpt = GROUPS.reduce((a,g)=>Math.max(a,g.opts.length),0);
document.getElementById('updated').textContent = LAST_UPDATED;
document.getElementById('statOpt').innerHTML = totalOpt + '<small>개</small>';
document.getElementById('statGoods').innerHTML = GROUPS.length + '<small>개</small>';
document.getElementById('statMax').innerHTML = maxOpt + '<small>개</small>';

// 렌더
const listEl = document.getElementById('list');
function render(filter){
  filter = (filter||'').trim().toLowerCase();
  listEl.innerHTML = '';
  let shown = 0;
  GROUPS.forEach((g, idx) => {
    let opts = g.opts;
    let groupMatch = !filter || g.gc.toLowerCase().includes(filter) || g.gn.toLowerCase().includes(filter);
    if(filter && !groupMatch){
      opts = g.opts.filter(o => o.oc.toLowerCase().includes(filter) || o.on.toLowerCase().includes(filter));
      if(opts.length === 0) return;
    }
    shown++;
    const collapsed = filter ? '' : (g.opts.length > 0 ? '' : '');
    const div = document.createElement('div');
    div.className = 'group';
    const rows = opts.map(o => `
      <tr>
        <td class="oc">${esc(o.oc)}</td>
        <td class="on">${esc(o.on)}</td>
        <td class="date">${esc(o.d)}</td>
      </tr>`).join('');
    div.innerHTML = `
      <div class="ghead">
        <span class="gcode">${esc(g.gc)}</span>
        <span class="gname">${esc(g.gn)}</span>
        <span class="gcount">품절 ${opts.length}개</span>
        <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="gbody">
        <table>
          <thead><tr><th class="col-oc">옵션코드</th><th>옵션명</th><th class="col-date">품절일</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    div.querySelector('.ghead').addEventListener('click', () => div.classList.toggle('collapsed'));
    listEl.appendChild(div);
  });
  document.getElementById('empty').style.display = shown ? 'none' : 'block';
}
render('');

// 검색
let t;
document.getElementById('q').addEventListener('input', e => {
  clearTimeout(t);
  t = setTimeout(() => render(e.target.value), 120);
});
// 펼치기/접기
document.getElementById('expandAll').addEventListener('click', () =>
  document.querySelectorAll('.group').forEach(g => g.classList.remove('collapsed')));
document.getElementById('collapseAll').addEventListener('click', () =>
  document.querySelectorAll('.group').forEach(g => g.classList.add('collapsed')));
</script>
