  .badge.red { background: #fee2e2; color: #991b1b; }

  .sku-item .sku-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .sku-item .stock { text-align: right; min-width: 60px; }
  .sku-item .stock .qty { font-size: 22px; font-weight: 800; }

// ====== RENDER ======
function renderSkuCards() {
  const inEl = document.getElementById('skuInStock');
  const noEl = document.getElementById('skuNoStock');
  const sorted = Object.entries(SKU_INFO).sort((a,b) => b[1].avail - a[1].avail);

  let inCount = 0, noCount = 0;

  sorted.filter(([,v]) => v.avail > 1).forEach(([sku, info]) => {
    inCount++;
    const barcodeHtml = info.barcode ? `<div class="sku-barcode">바코드: ${info.barcode}</div>` : '';
    inEl.innerHTML += `<div class="sku-item"><div class="info"><div class="sku-code">${sku}</div>${barcodeHtml}<div class="sku-name">${info.name}</div></div><div class="stock"><div class="qty green">${info.avail}</div><div class="unit">출고가능</div></div></div>`;
  });

  sorted.filter(([,v]) => v.avail >= 0 && v.avail <= 1).forEach(([sku, info]) => {
    noCount++;
    const barcodeHtml = info.barcode ? `<div class="sku-barcode">바코드: ${info.barcode}</div>` : '';
    noEl.innerHTML += `<div class="sku-item"><div class="info"><div class="sku-code">${sku}</div>${barcodeHtml}<div class="sku-name">${info.name}</div></div><div class="stock"><div class="qty zero">0</div><div class="unit">출고가능</div></div></div>`;
  });

  sorted.filter(([,v]) => v.unregistered).forEach(([sku, info]) => {
    noCount++;
    const barcodeHtml = info.barcode ? `<div class="sku-barcode">바코드: ${info.barcode}</div>` : '';
    noEl.innerHTML += `<div class="sku-item" style="border-color:#d97706"><div class="info"><div class="sku-code">${sku} <span style="color:#d97706;font-size:10px">사방넷 미등록</span></div>${barcodeHtml}<div class="sku-name">${info.name}</div></div><div class="stock"><div class="qty" style="color:#d97706">-</div><div class="unit">미등록</div></div></div>`;
  });

  document.getElementById('skuInCount').textContent = inCount;
  document.getElementById('skuNoCount').textContent = noCount;
}

function renderTable(filter, search) {
  const tbody = document.getElementById('tableBody');
  let filtered = DATA;
  if (filter && filter !== 'all') filtered = filtered.filter(d => d.verdict === filter);
  if (search) {
    const s = search.toLowerCase();
    filtered = filtered.filter(d =>
      d.gn.toLowerCase().includes(s) || d.on.toLowerCase().includes(s) ||
      (d.sku||'').toLowerCase().includes(s) || d.oc.includes(s) || d.gc.includes(s)
    );
  }
  if (currentSort !== 'none') {
    filtered = [...filtered].sort((a, b) => {
      const av = typeof a.avail === 'number' ? a.avail : -999;
      const bv = typeof b.avail === 'number' ? b.avail : -999;
      return currentSort === 'desc' ? bv - av : av - bv;
    });
  }
  tbody.innerHTML = filtered.map(d => {
    const badgeClass = d.verdict === '재고있음' ? 'green' : d.verdict === '재고없음' ? 'red' : 'yellow';
    let skuDisplay, availDisplay;
    if (d.isSet && d.skuList) {
      skuDisplay = d.skuList.map(s => {
        const color = s.avail < 0 ? '#d97706' : s.avail > 0 ? 'var(--green)' : 'var(--red)';
        return `<div style="margin:2px 0"><span style="color:${color}">${s.code}</span></div>`;
      }).join('');
      availDisplay = d.skuList.map(s => {
        if (s.avail < 0) return `<div style="margin:2px 0;color:#d97706;font-size:11px">미등록</div>`;
        if (s.avail > 0) return `<div style="margin:2px 0"><strong style="color:var(--green)">${s.avail}</strong></div>`;
        return `<div style="margin:2px 0">0</div>`;
      }).join('');
    } else {
      skuDisplay = d.sku || '-';
      availDisplay = d.avail === '-' ? '-' : (d.avail > 1 ? `<strong style="color:var(--green)">${d.avail}</strong>` : d.avail);
    }
    const setTag = d.isSet ? ' <span style="font-size:10px;background:#e0e7ff;color:#3730a3;padding:1px 5px;border-radius:3px;">세트</span>' : '';
    return `<tr>
      <td class="text-center mono">${d.gc}</td>
      <td class="ellipsis" title="${d.gn}">${d.gn}</td>
      <td class="text-center mono">${d.oc}</td>
      <td class="ellipsis" title="${d.on}">${d.on}${setTag}</td>
      <td class="text-center mono" style="font-size:11px">${skuDisplay}</td>
      <td class="text-center">${availDisplay}</td>
      <td class="text-center"><span class="badge ${badgeClass}">${d.verdict}</span></td>
    </tr>`;
  }).join('');
}

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// Filter buttons
let currentFilter = 'all';
let currentSort = 'none'; // none, desc, asc
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTable(currentFilter, document.getElementById('searchBox').value);
  });
});

// Search
document.getElementById('searchBox').addEventListener('input', (e) => {
  renderTable(currentFilter, e.target.value);
});

// Sort by avail
document.getElementById('sortAvail').addEventListener('click', () => {
  if (currentSort === 'none') currentSort = 'desc';
  else if (currentSort === 'desc') currentSort = 'asc';
  else currentSort = 'none';
  const icon = document.querySelector('#sortAvail .sort-icon');
  icon.textContent = currentSort === 'desc' ? '\u25BC' : currentSort === 'asc' ? '\u25B2' : '';
  renderTable(currentFilter, document.getElementById('searchBox').value);
});

// Init
renderSkuCards();
renderTable('all', '');
