  .header .sub { color: #94a3b8; font-size: 14px; }
  .header .sub span { color: #60a5fa; font-weight: 600; }

  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin: -36px 0 24px; position: relative; z-index: 1; }
  .summary-card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); text-align: center; border-top: 3px solid var(--border); }
  .summary-card.green { border-top-color: var(--green); }
  .summary-card.red { border-top-color: var(--red); }
  .summary-card.yellow { border-top-color: var(--yellow); }
  .summary-card.blue { border-top-color: var(--accent); }
  .summary-card .num { font-size: 32px; font-weight: 800; margin: 4px 0; }
  .summary-card .num.green { color: var(--green); }
  .summary-card .num.red { color: var(--red); }
  .summary-card .num.yellow { color: var(--yellow); }
  .summary-card .num.blue { color: var(--accent); }
  .summary-card .label { font-size: 13px; color: var(--muted); font-weight: 500; }

  .section { background: var(--card); border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .section h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section h2 .icon { font-size: 20px; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge.green { background: #dcfce7; color: #166534; }
  .badge.red { background: #fee2e2; color: #991b1b; }
  .badge.yellow { background: #fef3c7; color: #92400e; }

  .sku-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
  .sku-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-radius: 8px; border: 1px solid var(--border); transition: background .15s; }
  .sku-item:hover { background: #f8fafc; }
  .sku-item .info { flex: 1; min-width: 0; }
  .sku-item .sku-code { font-size: 12px; color: var(--muted); font-family: 'SF Mono', 'Consolas', monospace; }
  .sku-item .sku-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .sku-item .stock { text-align: right; min-width: 60px; }
  .sku-item .stock .qty { font-size: 22px; font-weight: 800; }
  .sku-item .stock .qty.green { color: var(--green); }
  .sku-item .stock .qty.zero { color: #cbd5e1; }
  .sku-item .stock .unit { font-size: 11px; color: var(--muted); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #f8fafc; padding: 10px 12px; text-align: left; font-weight: 600; color: var(--muted); font-size: 12px; text-transform: uppercase; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 2; }
  tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:hover { background: #f8fafc; }
  .table-wrap { max-height: 600px; overflow-y: auto; border-radius: 8px; border: 1px solid var(--border); }
  .text-center { text-align: center; }
  .text-right { text-align: right; }
  .mono { font-family: 'SF Mono', 'Consolas', monospace; font-size: 12px; }
  .ellipsis { max-width: 280px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
  .tab { padding: 10px 20px; cursor: pointer; font-weight: 600; font-size: 14px; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .footer { text-align: center; padding: 24px; color: var(--muted); font-size: 12px; }
